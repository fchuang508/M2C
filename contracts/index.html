<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>M2C · Public Contracts</title>
  <style>
    :root {
      --paper: #f6f3ec;
      --card: #fffdf8;
      --ink: #23201b;
      --muted: #71695e;
      --line: #d9d0c1;
      --teal: #15756f;
      --orange: #b86b2c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: "Noto Sans TC", "Noto Sans SC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(880px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 72px 0 56px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Noto Serif TC", "Noto Serif SC", serif;
      font-size: clamp(34px, 7vw, 62px);
      line-height: 1;
      font-weight: 700;
    }

    .intro {
      max-width: 620px;
      margin: 18px 0 42px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    a.item {
      display: grid;
      grid-template-columns: 82px 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 20px 22px;
      background: var(--card);
      border: 1px solid var(--line);
      color: inherit;
      text-decoration: none;
      transition: border-color .15s, transform .15s, background .15s;
    }

    a.item:hover {
      border-color: var(--orange);
      background: #fff8ec;
      transform: translateY(-1px);
    }

    .code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--teal);
      font-size: 13px;
      font-weight: 700;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .kind {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 8px;
      vertical-align: middle;
      color: var(--orange);
      background: #f6e9d8;
    }

    .url {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }

    .go {
      color: var(--orange);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    footer {
      margin-top: 36px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    @media (max-width: 640px) {
      main { width: min(100% - 28px, 880px); padding-top: 42px; }
      a.item { grid-template-columns: 1fr; gap: 8px; padding: 18px; }
      .go { margin-top: 4px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">M2C Public Contracts</div>
    <h1>公共契约</h1>
    <p class="intro">这里收录由会议、决议和协作记录整理出的公共契约。契约本体使用稳定 ID，不依附单一组织或个人页面。</p>

    <section class="list" aria-label="公共契约列表">
      <a class="item" href="./c_20260627_coart-create-promotion/">
        <div class="code">C-20260627</div>
        <div>
          <div class="title">Co-Art Create Promotion · 艺术共创营系列宣传框架<span class="kind">共创契约</span></div>
          <div class="url">/contracts/c_20260627_coart-create-promotion/</div>
        </div>
        <div class="go">进入</div>
      </a>
    </section>

    <footer>
      Future canonical mount: https://imeeting.club/contracts/
    </footer>
  </main>
</body>
</html>
