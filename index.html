<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>M2C · 報價單入口</title>
  <style>
    :root {
      --paper: #f6f3ec;
      --card: #fffdf8;
      --ink: #23201b;
      --muted: #71695e;
      --line: #d9d0c1;
      --teal: #15756f;
      --orange: #b86b2c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: "Noto Sans TC", "Noto Sans SC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(880px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 72px 0 56px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Noto Serif TC", "Noto Serif SC", serif;
      font-size: clamp(34px, 7vw, 62px);
      line-height: 1;
      font-weight: 700;
    }

    .intro {
      max-width: 620px;
      margin: 18px 0 42px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    a.item {
      display: grid;
      grid-template-columns: 82px 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 20px 22px;
      background: var(--card);
      border: 1px solid var(--line);
      color: inherit;
      text-decoration: none;
      transition: border-color .15s, transform .15s, background .15s;
    }

    a.item:hover {
      border-color: var(--orange);
      background: #fff8ec;
      transform: translateY(-1px);
    }

    .code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--teal);
      font-size: 13px;
      font-weight: 700;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .url {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }

    .go {
      color: var(--orange);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    footer {
      margin-top: 36px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    @media (max-width: 640px) {
      main { width: min(100% - 28px, 880px); padding-top: 42px; }
      a.item { grid-template-columns: 1fr; gap: 8px; padding: 18px; }
      .go { margin-top: 4px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">M2C Quotation Index</div>
    <h1>M2C 報價單入口</h1>
    <p class="intro">這裡整理 M2C 目前可公開瀏覽的正式報價單入口。各專案資料夾內的 <strong>index.html</strong> 為最新正式版本；歷史版本仍保留於各專案頁面的版本列表中。</p>

    <section class="list" aria-label="M2C 報價單列表">
      <a class="item" href="./01-semi-wallet-integration/">
        <div class="code">01</div>
        <div>
          <div class="title">Semi Wallet Integration</div>
          <div class="url">/M2C/01-semi-wallet-integration/</div>
        </div>
        <div class="go">進入</div>
      </a>

      <a class="item" href="./02-imeeting-onboarding-video/">
        <div class="code">02</div>
        <div>
          <div class="title">iMeeting Onboarding 視頻</div>
          <div class="url">/M2C/02-imeeting-onboarding-video/</div>
        </div>
        <div class="go">進入</div>
      </a>
    </section>

    <footer>
      GitHub Pages: https://fchuang508.github.io/M2C/
    </footer>
  </main>
</body>
</html>
